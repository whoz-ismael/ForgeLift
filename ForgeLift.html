document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

er','Chest'],\n      ['Lat Pulldown','Back'],['Seated Row','Back'],['Assisted Pull-Up','Back'],['Back Extension','Back'],\n      ['Leg Press','Legs'],['Leg Extension','Legs'],['Leg Curl','Legs'],['Hack Squat','Legs'],['Calf Raise','Legs'],\n      ['Shoulder Press','Shoulders'],['Lateral Raise','Shoulders'],['Rear Delt Fly','Shoulders'],\n      ['Bicep Curl','Arms'],['Tricep Pushdown','Arms'],['Preacher Curl','Arms'],\n      ['Ab Crunch','Core'],['Cable Crunch','Core'],\n    ];\n    const machines = base.map((b, i) => ({ id: 'm' + i, name: b[0], group: b[1], fav: false, photo: null }));\n    machines[0].fav = true; machines[4].fav = true; machines[8].fav = true;\n    const now = Date.now(), day = 86400000;\n    const dstr = (w) => new Date(now - w * 7 * day).toISOString().slice(0, 10);\n    const series = (n, start, step) => {\n      const out = [];\n      for (let k = 0; k < n; k++) {\n        const w = start + k * step;\n        out.push({ date: dstr(n - 1 - k), sets: [\n          { reps: 12, weight: Math.max(start, w - step) },\n          { reps: 10, weight: w },\n          { reps: 8, weight: w },\n        ]});\n      }\n      return out;\n    };\n    const logs = { m0: series(8, 40, 2.5), m4: series(7, 45, 2.5), m8: series(8, 80, 5), m13: series(6, 25, 2.5) };\n    return { machines, logs };\n  }\n\n  persist(patch) {\n    const u = (patch && patch.user) || this.state.user;\n    if (!u) return;\n    const s = Object.assign({}, this.state, patch || {});\n    try { localStorage.setItem('replog:' + u.toLowerCase(), JSON.stringify({ machines: s.machines, logs: s.logs, unit: s.unit, theme: s.theme })); } catch (e) {}\n  }\n  save(patch) { this.setState(patch, () => this.persist()); }\n\n  // ── login ──\n  onUserInput = (e) => this.setState({ usernameDraft: e.target.value, loginError: '' });\n  pinPress(d) { if (this.state.pinDraft.length >= 4) return; this.setState({ pinDraft: this.state.pinDraft + d, loginError: '' }); }\n  pinDel = () => this.setState({ pinDraft: this.state.pinDraft.slice(0, -1) });\n  doLogin = () => {\n    const u = this.state.usernameDraft.trim();\n    const p = this.state.pinDraft;\n    if (!u) { this.setState({ loginError: 'ENTER A USERNAME' }); return; }\n    if (p.length < 4) { this.setState({ loginError: 'PIN MUST BE 4 DIGITS' }); return; }\n    let data = null;\n    try { const raw = localStorage.getItem('replog:' + u.toLowerCase()); if (raw) data = JSON.parse(raw); } catch (e) {}\n    if (!data) data = this.seed();\n    this.setState({\n      user: u, machines: data.machines, logs: data.logs,\n      unit: data.unit || this.state.unit, theme: data.theme || this.state.theme,\n      screen: 'home', loginError: '', pinDraft: '', usernameDraft: '',\n    });\n  };\n  logout = () => this.setState({ screen: 'login', user: null, machines: [], logs: {}, activeId: null, draft: [], pinDraft: '', usernameDraft: '', search: '' });\n\n  // ── nav ──\n  openSettings = () => this.setState({ screen: 'settings' });\n  openAdd = () => this.setState({ screen: 'add', addName: '', addPhoto: null, addGroup: 'Chest' });\n  goHome = () => this.setState({ screen: 'home', search: '' });\n  openMachine(id) { this.setState({ activeId: id, draft: [], screen: 'machine' }); }\n  onSearch = (e) => this.setState({ search: e.target.value });\n\n  // ── favorites ──\n  toggleFav(id) { this.save({ machines: this.state.machines.map(m => m.id === id ? Object.assign({}, m, { fav: !m.fav }) : m) }); }\n\n  // ── set drafting ──\n  lastWeight(id) { const s = this.state.logs[id] || []; if (!s.length) return 20; const l = s[s.length - 1]; return Math.max.apply(null, l.sets.map(x => x.weight)); }\n  addSet = () => this.setState({ draft: this.state.draft.concat([{ reps: 10, weight: this.lastWeight(this.state.activeId) }]) });\n  duplicateLast = () => { const d = this.state.draft; if (!d.length) { this.addSet(); return; } const s = d[d.length - 1]; this.setState({ draft: d.concat([{ reps: s.reps, weight: s.weight }]) }); };\n  repsDelta(i, dl) { this.setState({ draft: this.state.draft.map((s, j) => j === i ? Object.assign({}, s, { reps: Math.max(1, s.reps + dl) }) : s) }); }\n  weightDelta(i, dl) { const step = this.state.unit === 'lb' ? 5 * this.LB : 2.5; this.setState({ draft: this.state.draft.map((s, j) => j === i ? Object.assign({}, s, { weight: Math.max(0, Math.round((s.weight + dl * step) * 1000) / 1000) }) : s) }); }\n  removeSet(i) { this.setState({ draft: this.state.draft.filter((_, j) => j !== i) }); }\n  saveSession = () => {\n    const id = this.state.activeId, d = this.state.draft;\n    if (!d.length) return;\n    const today = new Date().toISOString().slice(0, 10);\n    const logs = Object.assign({}, this.state.logs);\n    logs[id] = (logs[id] || []).concat([{ date: today, sets: d.map(s => ({ reps: s.reps, weight: s.weight })) }]);\n    this.save({ logs, draft: [] });\n  };\n\n  // ── add machine ──\n  onAddName = (e) => this.setState({ addName: e.target.value });\n  handlePhoto = (e) => { const f = e.target.files && e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => this.setState({ addPhoto: r.result }); r.readAsDataURL(f); };\n  saveMachine = () => {\n    const n = this.state.addName.trim(); if (!n) return;\n    const m = { id: 'c' + Date.now(), name: n, group: this.state.addGroup, fav: false, photo: this.state.addPhoto };\n    this.save({ machines: this.state.machines.concat([m]), addName: '', addPhoto: null, screen: 'home' });\n  };\n\n  // ── settings ──\n  setThemeLight = () => this.save({ theme: 'light' });\n  setThemeDark = () => this.save({ theme: 'dark' });\n  setUnitKg = () => this.save({ unit: 'kg' });\n  setUnitLb = () => this.save({ unit: 'lb' });\n\n  dispW(kg) { return this.state.unit === 'lb' ? Math.round(kg / this.LB) : Math.round(kg * 10) / 10; }\n  fmtDate(iso) { try { return new Date(iso + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: '2-digit' }).toUpperCase(); } catch (e) { return iso; } }\n\n  iconKey(name, group) {\n    const n = (name || '').toLowerCase();\n    if (n.includes('pulldown')) return 'pulldown';\n    if (n.includes('pull-up') || n.includes('pull up') || n.includes('pullup') || n.includes('chin')) return 'pullup';\n    if (n.includes('row')) return 'row';\n    if (n.includes('crossover') || n.includes('pec deck') || n.includes('fly')) return 'fly';\n    if (n.includes('lateral') || n.includes('lat raise')) return 'lateral';\n    if (n.includes('leg') && n.includes('curl')) return 'legcurl';\n    if (n.includes('leg press')) return 'legpress';\n    if (n.includes('leg') && n.includes('ext')) return 'legext';\n    if (n.includes('back ext') || n.includes('hyperext')) return 'backext';\n    if (n.includes('squat')) return 'squat';\n    if (n.includes('calf')) return 'calf';\n    if (n.includes('pushdown') || n.includes('tricep')) return 'pushdown';\n    if (n.includes('curl')) return 'curl';\n    if (n.includes('crunch') || n.includes('ab ')) return 'crunch';\n    if (n.includes('press')) return 'press';\n    const g = { Chest: 'press', Back: 'pulldown', Legs: 'legpress', Shoulders: 'lateral', Arms: 'curl', Core: 'crunch' };\n    return g[group] || 'press';\n  }\n\n  brandMark(c, a) {\n    const cell = 56, R = 25, sx = 512 - 6 * cell, sy = 512 - 4 * cell;\n    const dots = []; const add = (col, row, red) => dots.push([col, row, red]);\n    for (let col = 3; col <= 9; col++) add(col, 4, col === 6);\n    [3, 9].forEach(col => { add(col, 3); add(col, 5); });\n    [2, 10].forEach(col => { [2, 3, 4, 5, 6].forEach(row => add(col, row)); });\n    [1, 11].forEach(col => { for (let row = 1; row <= 7; row++) add(col, row); });\n    const circ = dots.map(d => `<circle cx=\"${sx + d[0] * cell}\" cy=\"${sy + d[1] * cell}\" r=\"${R}\" fill=\"${d[2] ? a : c}\"/>`).join('');\n    const svg = `<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1024 1024\">${circ}<\u002Fsvg>`;\n    return 'data:image/svg+xml,' + encodeURIComponent(svg);\n  }\n\n  machineIcon(name, group, c, a) {\n    const W = `fill=\"${a}\" stroke=\"none\"`;\n    const P = {\n      press: `<circle cx=\"20\" cy=\"9\" r=\"2.6\"/><path d=\"M20 12v9\"/><path d=\"M20 21l-4 8\"/><path d=\"M20 21l4 8\"/><path d=\"M20 14l-6-3\"/><path d=\"M20 14l6-3\"/><path d=\"M11 11h18\"/><circle cx=\"11\" cy=\"11\" r=\"2.4\" ${W}/><circle cx=\"29\" cy=\"11\" r=\"2.4\" ${W}/>`,\n      curl: `<circle cx=\"18\" cy=\"9\" r=\"2.6\"/><path d=\"M18 12v10\"/><path d=\"M18 22l-4 7\"/><path d=\"M18 22l4 7\"/><path d=\"M18 14l4 5\"/><path d=\"M22 19l-3-4\"/><circle cx=\"19\" cy=\"14.5\" r=\"2.4\" ${W}/>`,\n      lateral: `<circle cx=\"20\" cy=\"9\" r=\"2.6\"/><path d=\"M20 12v10\"/><path d=\"M20 22l-4 7\"/><path d=\"M20 22l4 7\"/><path d=\"M20 14h-9\"/><path d=\"M20 14h9\"/><circle cx=\"10\" cy=\"14\" r=\"2.4\" ${W}/><circle cx=\"30\" cy=\"14\" r=\"2.4\" ${W}/>`,\n      fly: `<circle cx=\"20\" cy=\"9\" r=\"2.6\"/><path d=\"M20 12v10\"/><path d=\"M20 22l-4 7\"/><path d=\"M20 22l4 7\"/><path d=\"M20 14c-6 0-9 2-9 6\"/><path d=\"M20 14c6 0 9 2 9 6\"/><circle cx=\"11\" cy=\"20\" r=\"2.4\" ${W}/><circle cx=\"29\" cy=\"20\" r=\"2.4\" ${W}/>`,\n      pulldown: `<path d=\"M12 7h16\"/><circle cx=\"12\" cy=\"7\" r=\"2.2\" ${W}/><circle cx=\"28\" cy=\"7\" r=\"2.2\" ${W}/><circle cx=\"20\" cy=\"15\" r=\"2.6\"/><path d=\"M20 18v6\"/><path d=\"M20 18l-5-9\"/><path d=\"M20 18l5-9\"/><path d=\"M20 24l-4 6\"/><path d=\"M20 24l5 3v3\"/>`,\n      row: `<path d=\"M30 7v25\"/><circle cx=\"15\" cy=\"12\" r=\"2.6\"/><path d=\"M15 15v6\"/><path d=\"M15 21h7l3 8\"/><path d=\"M15 16h9\"/><circle cx=\"24\" cy=\"16\" r=\"2.4\" ${W}/><path d=\"M26 16h4\"/>`,\n      pullup: `<path d=\"M9 8h22\"/><path d=\"M16 8v3\"/><path d=\"M24 8v3\"/><circle cx=\"20\" cy=\"14\" r=\"2.6\"/><path d=\"M16 11l4 3 4-3\"/><path d=\"M20 17v8\"/><path d=\"M20 25l-3 6\"/><path d=\"M20 25l3 6\"/>`,\n      backext: `<path d=\"M7 31l12-7\"/><circle cx=\"16\" cy=\"18\" r=\"2.6\"/><path d=\"M16 21l8 5\"/><path d=\"M24 26l6-2\"/><path d=\"M16 21l-3 8\"/><circle cx=\"30\ iconStroke = isDark ? '#d6d6d6' : '#3a3a3a';\n    const iconAccent = '#D71921';\n\n    const themeVars = isDark\n      ? { '--bg': '#000000', '--surface': '#0f0f0f', '--border': '#262626', '--text': '#ffffff', '--muted': '#7d7d7d', '--accent': '#D71921', '--dot': '#161616' }\n      : { '--bg': '#f4f4f2', '--surface': '#ffffff', '--border': '#dddcd7', '--text': '#0a0a0a', '--muted': '#9a9a94', '--accent': '#D71921', '--dot': '#e4e3de' };\n    const shell = Object.assign({}, themeVars, {\n      height: '100%', background: 'var(--bg)', color: 'var(--text)',\n      fontFamily: \"'Space Mono', monospace\", overflow: 'hidden', position: 'relative',\n    });\n\n    // login\n    const pinDots = [0, 1, 2, 3].map(i => ({ filled: i < S.pinDraft.length, empty: i >= S.pinDraft.length }));\n    const pinKeys = ['1','2','3','4','5','6','7','8','9'].map(d => ({ d, onPress: () => this.pinPress(d) }));\n\n    // home machine rows\n    const q = S.search.trim().toLowerCase();\n    const filt = S.machines.filter(m => !q || m.name.toLowerCase().includes(q));\n    const mkRow = (m) => {\n      const sess = S.logs[m.id] || [];\n      const last = sess.length ? sess[sess.length - 1] : null;\n      const lastMax = last ? Math.max.apply(null, last.sets.map(s => s.weight)) : null;\n      return {\n        id: m.id, name: m.name, fav: m.fav, notFav: !m.fav,\n        photo: m.photo || null, noPhoto: !m.photo,\n        initials: m.name.split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase(),\n        icon: this.machineIcon(m.name, m.group, iconStroke, iconAccent),\n        detail: lastMax != null ? dispW(lastMax) + ' ' + ul : '—',\n        onOpen: () => this.openMachine(m.id),\n        onFav: (e) => { if (e && e.stopPropagation) e.stopPropagation(); this.toggleFav(m.id); },\n      };\n    };\n    const groups = [];\n    const favs = filt.filter(m => m.fav).map(mkRow);\n    if (favs.length) groups.push({ group: 'Favorites', count: favs.length, items: favs });\n    this.GROUPS.forEach(g => {
